# =============================================================================
#  Docker Compose — Production / Self-hosted
#  Runs all services including the Node apps.
#  For Railway/Render, use individual Dockerfiles instead.
# =============================================================================

version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lms_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed — internal network only

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lms_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Piston ──────────────────────────────────────────────────────────────────
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: lms_piston
    restart: always
    privileged: true
    tmpfs:
      - /piston/jobs
    environment:
      PISTON_RUN_TIMEOUT: ${PISTON_RUN_TIMEOUT:-10000}
      PISTON_COMPILE_TIMEOUT: ${PISTON_COMPILE_TIMEOUT:-15000}
    # No ports exposed — internal network only

  # ── API Server ────────────────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: lms_server
    restart: always
    env_file: ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PISTON_URL: http://piston:2000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        node -e 'require(\"@prisma/client\")' &&
        npx prisma migrate deploy &&
        node dist/server.js
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── BullMQ Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: lms_worker
    restart: always
    env_file: ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PISTON_URL: http://piston:2000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: lms_prod_network
