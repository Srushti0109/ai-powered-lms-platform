# =============================================================================
#  Docker Compose — Development
#  Starts: PostgreSQL, Redis, Piston (code runner)
#  Does NOT containerise the Node apps — run those with `pnpm dev`
# =============================================================================

version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lms_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d  # optional init SQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lms_redis_dev
    restart: unless-stopped
    command: redis-server --requirepass lms_redis_password --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "lms_redis_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Piston (sandboxed code execution) ─────────────────────────────────────
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: lms_piston_dev
    restart: unless-stopped
    privileged: true         # required for Piston's container isolation
    ports:
      - "2000:2000"
    tmpfs:
      - /piston/jobs         # ephemeral job filesystem
    environment:
      PISTON_RUN_TIMEOUT: 10000
      PISTON_COMPILE_TIMEOUT: 15000
      PISTON_OUTPUT_MAX_SIZE: 65536
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2000/api/v2/runtimes || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s     # Piston takes time to start

  # ── Redis Commander (dev UI for Redis) ─────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lms_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:lms_redis_password"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  default:
    name: lms_dev_network
